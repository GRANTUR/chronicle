# =============================================================================
# The Chronicle — Unified Calendar Assistant
# Deployed on high-palace (needs Traefik ingress for OAuth + webhooks)
# =============================================================================

apiVersion: v1
kind: Namespace
metadata:
  name: ecosystem

---
# --- Google OAuth credentials ---
apiVersion: v1
kind: Secret
metadata:
  name: chronicle-google-creds
  namespace: ecosystem
type: Opaque
stringData:
  google-creds.json: |
    REDACTED — set on server only

---
# --- Chronicle config secrets ---
apiVersion: v1
kind: Secret
metadata:
  name: chronicle-secrets
  namespace: ecosystem
type: Opaque
stringData:
  DISCORD_WEBHOOK_URL: "REDACTED"
  AZURE_CLIENT_ID: "REDACTED"
  AZURE_CLIENT_SECRET: "REDACTED"
  AZURE_TENANT_ID: "consumers"
  DISCORD_BOT_TOKEN: "REDACTED"
  ANTHROPIC_API_KEY: "REDACTED"

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: chronicle-data
  namespace: ecosystem
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 1Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: chronicle
  namespace: ecosystem
  labels:
    app: chronicle
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chronicle
  template:
    metadata:
      labels:
        app: chronicle
    spec:
      nodeSelector:
        role: game-server
      containers:
        - name: chronicle
          image: chronicle:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8090
          env:
            - name: GOOGLE_CREDS_FILE
              value: /secrets/google/google-creds.json
            - name: GOOGLE_TOKEN_FILE
              value: /data/google-token.json
            - name: OUTLOOK_TOKEN_FILE
              value: /data/outlook-token.json
            - name: CHRONICLE_DB
              value: /data/chronicle.db
            - name: OLLAMA_URL
              value: http://ollama-relay.minecraft.svc.cluster.local:11434
            - name: OLLAMA_MODEL
              value: qwen3:14b
            - name: WEBHOOK_BASE_URL
              value: https://gigilab.duckdns.org/chronicle
            - name: CHRONICLE_PORT
              value: "8090"
          envFrom:
            - secretRef:
                name: chronicle-secrets
          volumeMounts:
            - name: google-creds
              mountPath: /secrets/google
              readOnly: true
            - name: data
              mountPath: /data
          resources:
            requests:
              memory: 128Mi
              cpu: 50m
            limits:
              memory: 256Mi
              cpu: 200m
      volumes:
        - name: google-creds
          secret:
            secretName: chronicle-google-creds
        - name: data
          persistentVolumeClaim:
            claimName: chronicle-data

---
apiVersion: v1
kind: Service
metadata:
  name: chronicle
  namespace: ecosystem
spec:
  type: NodePort
  selector:
    app: chronicle
  ports:
    - port: 8090
      targetPort: 8090
      nodePort: 30890
