metadata:
  name: chronicle-google-creds
  namespace: ecosystem
type: Opaque
stringData:
  google-creds.json: |
    {"web":{"client_id":"39034318857-d3jdj29hhne68u6ukht0qm5vskfgnnn6.apps.googleusercontent.com","project_id":"empyrean-chronicle","auth_uri":"https://accounts.google.com/o/oauth2/auth","token_uri":"https://oauth2.googleapis.com/token","auth_provider_x509_cert_url":"https://www.googleapis.com/oauth2/v1/certs","client_secret":"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","redirect_uris":["https://gigilab.duckdns.org/chronicle/oauth/callback"]}}

---
# --- Chronicle config secrets ---
apiVersion: v1
kind: Secret
metadata:
  name: chronicle-secrets
  namespace: ecosystem
type: Opaque
stringData:
  DISCORD_WEBHOOK_URL: "https://discord.com/api/webhooks/1487842660554244177/nxGbjmGt98ZkIP3vVVt-8oTL3hhvI8aob50ZSfDMNbMUVgpf4xoYbuJo0zx4XpjhVeog"
  AZURE_CLIENT_ID: "4037e959-ecd2-4e2b-9f26-c0a4802f729d"
  AZURE_CLIENT_SECRET: "dyd8Q~njVll7RhXYE3S-fgC0ovFjGYtEd~12SbVC"
  AZURE_TENANT_ID: "consumers"
  DISCORD_BOT_TOKEN: "MTQ4Nzg1Mzg0OTczMjU4MzQ0NA.GnNtOP.rBZP0cfe35MuANj7C7LNK5Id_tFW33WZPecGwk"
  ANTHROPIC_API_KEY: "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"

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: chronicle-data
  namespace: ecosystem
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 1Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: chronicle
  namespace: ecosystem
  labels:
    app: chronicle
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chronicle
  template:
    metadata:
      labels:
        app: chronicle
    spec:
      nodeSelector:
        role: game-server
      containers:
        - name: chronicle
          image: chronicle:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8090
          env:
            - name: GOOGLE_CREDS_FILE
              value: /secrets/google/google-creds.json
            - name: GOOGLE_TOKEN_FILE
              value: /data/google-token.json
            - name: OUTLOOK_TOKEN_FILE
              value: /data/outlook-token.json
            - name: CHRONICLE_DB
              value: /data/chronicle.db
            - name: OLLAMA_URL
              value: http://ollama-relay.minecraft.svc.cluster.local:11434
            - name: OLLAMA_MODEL
              value: qwen3.5:9b
            - name: WEBHOOK_BASE_URL
              value: https://gigilab.duckdns.org/chronicle
            - name: CHRONICLE_PORT
              value: "8090"
          envFrom:
            - secretRef:
                name: chronicle-secrets
          volumeMounts:
            - name: google-creds
              mountPath: /secrets/google
              readOnly: true
            - name: data
              mountPath: /data
          resources:
            requests:
              memory: 128Mi
              cpu: 50m
            limits:
              memory: 256Mi
              cpu: 200m
      volumes:
        - name: google-creds
          secret:
            secretName: chronicle-google-creds
        - name: data
          persistentVolumeClaim:
            claimName: chronicle-data

---
apiVersion: v1
kind: Service
metadata:
  name: chronicle
  namespace: ecosystem
spec:
  type: NodePort
  selector:
    app: chronicle
  ports:
    - port: 8090
      targetPort: 8090
      nodePort: 30890
